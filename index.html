<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKA ERP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}
body.dark{--bg:#1a1a1a;--bg2:#222;--bg3:#2a2a2a;--bg4:#303030;--border:#333;--border2:#444;--text:#f0f0ee;--text2:#a0a09a;--text3:#666660;--green:#3dba78;--green-bg:#1e2e24;--amber:#d4a030;--amber-bg:#2e2618;--red:#d45c5c;--red-bg:#2e1e1e;--shadow:rgba(0,0,0,.3);--nav-bg:rgba(30,30,30,.88)}
body.light{--bg:#f4f4f0;--bg2:#ffffff;--bg3:#ededea;--bg4:#e4e4e0;--border:#d8d8d4;--border2:#c8c8c4;--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a96;--green:#1f9a5e;--green-bg:#e8f7ef;--amber:#b07800;--amber-bg:#fef8e0;--red:#c04040;--red-bg:#fdf0f0;--shadow:rgba(0,0,0,.08);--nav-bg:rgba(255,255,255,.88)}
body.easter{--bg:#0C243D;--bg2:#27496A;--bg3:#1e3a56;--bg4:#2d5276;--border:#3a6080;--border2:#4a7090;--text:#C1D1DB;--text2:#9AB7CD;--text3:#5C8EB4;--green:#5CBBA0;--green-bg:#0e2a30;--amber:#d4a030;--amber-bg:#2e2618;--red:#e07070;--red-bg:#2e1e1e;--shadow:rgba(0,0,0,.5);--nav-bg:rgba(12,36,61,.92)}
body.easter .toggle-track{background:#3a6080}
body.easter .toggle-track.on{background:#5C8EB4}
body.easter .btn-primary{background:#C1D1DB;color:#0C243D}
body.easter .nav-item.active{border-left-color:#9AB7CD;background:#1e3a56;color:#C1D1DB}
body.easter .topbar-date{cursor:pointer;user-select:none}
body.easter .topbar-date:hover{opacity:.75}
body{background:var(--bg);color:var(--text)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:9px 13px;width:100%;font-family:inherit;font-size:13px;outline:none;transition:border .2s,background .2s}
input:focus,select:focus,textarea:focus{border-color:var(--text3)}
button{cursor:pointer;font-family:inherit;border:none;border-radius:10px;font-size:13px;font-weight:500;transition:all .15s}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
select option{background:var(--bg3);color:var(--text)}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 0;flex-shrink:0;transition:background .2s}
.sidebar-logo{padding:0 18px 20px;border-bottom:1px solid var(--border)}
.logo-text{font-size:14px;font-weight:600;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.nav{flex:1;padding:14px 0;overflow-y:auto}
.nav-section{font-size:10px;color:var(--text3);padding:10px 18px 5px;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--text);font-weight:500}
.sidebar-bottom{padding:10px 18px 14px;border-top:1px solid var(--border)}
.theme-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:10px}
.theme-label{font-size:11px;color:var(--text3)}
.toggle-track{width:32px;height:18px;background:var(--bg4);border-radius:20px;position:relative;cursor:pointer;border:1px solid var(--border2);transition:background .2s}
.toggle-track.on{background:var(--text3)}
.toggle-thumb{width:12px;height:12px;border-radius:50%;background:var(--text);position:absolute;top:2px;left:2px;transition:left .2s}
.toggle-track.on .toggle-thumb{left:16px}
.user-chip{display:flex;align-items:center;gap:9px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.user-name{font-size:12px;font-weight:500;color:var(--text)}
.user-role{font-size:10px;color:var(--text3)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.page-sub{font-size:11px;color:var(--text3);margin-top:1px}
.content{padding:22px 26px;flex:1}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;transition:background .2s}
.card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.metric-value{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;line-height:1;color:var(--text)}
.metric-change{font-size:11px;margin-top:5px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge.pending{background:var(--amber-bg);color:var(--amber)}
.badge.approved{background:var(--green-bg);color:var(--green)}
.badge.rejected{background:var(--red-bg);color:var(--red)}
.badge.new{background:var(--bg3);color:var(--text2)}
.badge.converted{background:var(--green-bg);color:var(--green)}
.badge.lost{background:var(--bg3);color:var(--text3)}
.badge.in-stock{background:var(--green-bg);color:var(--green)}
.badge.low-stock{background:var(--amber-bg);color:var(--amber)}
.badge.delivered{background:var(--green-bg);color:var(--green)}
.badge.scheduled{background:var(--amber-bg);color:var(--amber)}
.badge.unscheduled{background:var(--bg3);color:var(--text3)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:7px 11px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 11px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
td.primary{color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.btn{padding:8px 16px;font-size:12px;font-weight:500;border-radius:10px;cursor:pointer;border:none}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(61,186,120,.2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(212,92,92,.2)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(212,160,48,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
.form-grid{display:flex;flex-direction:column;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px}
.login-form{margin-top:24px;display:flex;flex-direction:column;gap:14px}
.demo-label{font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.role-btns{display:flex;gap:6px;flex-wrap:wrap}
.role-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif}
.role-btn:hover{border-color:var(--text3);color:var(--text)}
.invoice-items{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.item-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;padding:10px 14px;align-items:center;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-header{background:var(--bg4);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.empty{text-align:center;padding:40px;color:var(--text3)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px 20px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;margin:auto}
.modal-title{font-size:14px;font-weight:600;margin-bottom:18px;color:var(--text)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.modal-actions .btn{flex:1;min-width:80px;text-align:center;padding:11px 10px}
.notif{position:fixed;top:18px;right:18px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;z-index:300;font-size:12px;display:flex;align-items:center;gap:9px;max-width:340px;box-shadow:0 4px 20px var(--shadow)}
.notif.success{border-color:var(--green)}
.notif.error{border-color:var(--red)}
.comment-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px}
.comment-meta{font-size:10px;color:var(--text3);margin-bottom:4px}
.comment-text{font-size:12px;color:var(--text2)}
.approval-banner{background:var(--green-bg);border:1px solid rgba(61,186,120,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--green)}
.rejection-banner{background:var(--red-bg);border:1px solid rgba(212,92,92,.25);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;margin-bottom:16px;padding:6px 0}
.back-btn:hover{color:var(--text)}
.tag{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:10px;background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.print-page{display:none}
@media print{body>*{display:none}.print-page{display:block!important;position:fixed;inset:0;background:#fff;color:#111;padding:40px;font-family:'Sora',sans-serif;z-index:9999;overflow:auto}}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
/* circular progress */
.circ-wrap{position:relative;width:48px;height:48px;flex-shrink:0}
.circ-wrap svg{transform:rotate(-90deg)}
.circ-wrap .circ-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text)}
/* quot product card */
.quot-group{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.quot-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;transition:background .15s}
.quot-chip:hover{background:var(--bg2)}
/* quot formal table */
.quot-table{width:100%;border-collapse:collapse;margin:12px 0}
.quot-table th{background:var(--bg3);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.quot-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.quot-table td.num{font-family:'JetBrains Mono',monospace;text-align:right}
.quot-table tr:last-child td{border-bottom:none}
.quot-total-row td{font-weight:600;color:var(--text);background:var(--bg3)}
.sect-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:20px}
/* Dev Admin AI Panel */
.dev-ai-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:8px 10px;margin-bottom:10px}
.dev-ai-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.dev-ai-label span{width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;animation:devpulse 2s infinite}
@keyframes devpulse{0%,100%{opacity:1}50%{opacity:.4}}
.dev-ai-row{display:flex;gap:5px;align-items:center}
.dev-ai-input{flex:1;font-size:11px;padding:5px 8px;border-radius:7px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);outline:none;min-width:0}
.dev-ai-input:focus{border-color:var(--text3)}
.dev-ai-btn{padding:5px 8px;border-radius:7px;background:var(--text);color:var(--bg);font-size:11px;border:none;cursor:pointer;flex-shrink:0;font-weight:600;transition:opacity .15s}
.dev-ai-btn:hover{opacity:.8}
/* AI Chat Popup */
.dev-chat-overlay{position:fixed;inset:0;z-index:500;pointer-events:none}
.dev-chat-popup{position:fixed;bottom:20px;left:220px;width:360px;height:500px;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;display:flex;flex-direction:column;z-index:501;box-shadow:0 8px 40px rgba(0,0,0,.35);pointer-events:all;overflow:hidden}
.dev-chat-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg3)}
.dev-chat-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.dev-chat-close{width:22px;height:22px;border-radius:6px;background:var(--bg4);border:1px solid var(--border2);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dev-chat-close:hover{color:var(--text);border-color:var(--text3)}
.dev-chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.dev-chat-messages::-webkit-scrollbar{width:4px}
.dev-chat-messages::-webkit-scrollbar-track{background:transparent}
.dev-chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.chat-msg{max-width:88%;font-size:12px;line-height:1.5;padding:8px 11px;border-radius:10px;word-break:break-word}
.chat-msg.user{background:var(--bg4);color:var(--text);align-self:flex-end;border-bottom-right-radius:3px}
.chat-msg.ai{background:var(--bg3);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px;border:1px solid var(--border)}
.chat-msg.ai.thinking{color:var(--text3);font-style:italic}
.chat-msg-meta{font-size:9px;color:var(--text3);margin-top:3px}
.dev-chat-bottom{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;background:var(--bg2)}
.dev-chat-bottom input{flex:1;font-size:12px;padding:7px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);outline:none}
.dev-chat-bottom input:focus{border-color:var(--text3)}
.dev-chat-send{padding:7px 12px;border-radius:8px;background:var(--text);color:var(--bg);font-size:12px;border:none;cursor:pointer;font-weight:600;transition:opacity .15s;flex-shrink:0}
.dev-chat-send:hover{opacity:.8}
.dev-chat-send:disabled{opacity:.4;cursor:not-allowed}
.mini-grid {display: grid;grid-template-columns: repeat(4, 1fr);gap: 12px;}
.mini-card {background: #1e1e1e;border-radius: 10px;padding: 10px;min-height: 70px;display: flex;flex-direction: column;justify-content: space-between;}
.mini-title {
  font-size: 12px;
  opacity: 0.7;
}

.mini-content {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

/* Button */
.mini-btn {
  background: #333;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

/* Toggle */
.toggle {
  width: 36px;
  height: 18px;
  background: #444;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
}

.toggle-knob {
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.2s;
}

/* ── MOBILE BOTTOM NAV BAR ── */
.mobile-nav{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--nav-bg,rgba(26,26,26,.97));
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  z-index:250;
  padding:6px 8px 10px;
  gap:2px;
  align-items:stretch;
  justify-content:space-around;
  box-shadow:0 -4px 20px rgba(0,0,0,.25);
}
body.light .mobile-nav{background:rgba(255,255,255,.97)}
.mob-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 6px;border-radius:12px;cursor:pointer;
  color:var(--text3);font-size:10px;font-weight:500;
  flex:1;min-width:0;max-width:80px;
  transition:all .18s;font-family:'Sora',sans-serif;
  border:none;background:transparent;
}
.mob-item.active{background:var(--bg3);color:var(--text)}
.mob-item:not(.active):hover{background:var(--bg3);color:var(--text2)}
.mob-icon{font-size:20px;line-height:1.2;display:block}
.mob-label{font-size:10px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px}

/* ── MOBILE PROFILE BUTTON ── */
.mob-profile-btn{
  display:none;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:5px 10px 5px 5px;cursor:pointer;
  transition:all .15s;
}
.mob-profile-btn:hover{border-color:var(--text3)}
.mob-theme-btn{
  display:none;align-items:center;justify-content:center;
  width:34px;height:34px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:50%;cursor:pointer;font-size:16px;
  transition:all .15s;flex-shrink:0;
}
.mob-theme-btn:hover{border-color:var(--text3)}
.mob-profile-avatar{width:26px;height:26px;border-radius:50%;background:var(--bg4);color:var(--text);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.mob-profile-name{font-size:11px;font-weight:500;color:var(--text)}

/* ── MOBILE PROFILE SHEET — stays as bottom sheet intentionally ── */
.mob-profile-sheet{
  position:fixed;inset:0;z-index:400;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);
  padding:20px;
}
.mob-profile-inner{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:16px;width:100%;max-width:400px;padding:24px 20px 28px;
}
.mob-profile-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.mob-big-avatar{width:52px;height:52px;border-radius:50%;background:var(--bg4);color:var(--text);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.mob-profile-info-name{font-size:16px;font-weight:600;color:var(--text)}
.mob-profile-info-role{font-size:12px;color:var(--text3);margin-top:2px}
.mob-profile-info-email{font-size:11px;color:var(--text3);margin-top:2px}

/* ── TABLE SCROLL ── */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}

/* ── USERS TABLE ACTIONS — ALWAYS VISIBLE ── */
.user-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}

/* ── IMPORT CHOICE CARDS ── */
.import-choice{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:4px}
.import-opt{border:2px solid var(--border2);border-radius:14px;padding:22px 16px;cursor:pointer;text-align:center;transition:all .2s;background:var(--bg3)}
.import-opt:hover,.import-opt.selected{border-color:var(--text);background:var(--bg4)}
.import-opt-icon{font-size:32px;margin-bottom:10px}
.import-opt-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.import-opt-desc{font-size:11px;color:var(--text3)}

function genId(p){return p+'-'+Date.now().toString(36).toUpperCase()}

function getInitials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}

function CircleProgress({count,max,size=48}){
  const r=18,circ=2*Math.PI*r;
  const pct=max>0?count/max:0;
  const dash=circ*pct;
  return React.createElement('div',{className:'circ-wrap',style:{width:size,height:size}},
    React.createElement('svg',{width:size,height:size,viewBox:'0 0 44 44'},
      React.createElement('circle',{cx:22,cy:22,r:r,fill:'none',stroke:'var(--bg4)',strokeWidth:4}),
      React.createElement('circle',{cx:22,cy:22,r:r,fill:'none',stroke:'var(--green)',strokeWidth:4,strokeDasharray:`${dash} ${circ}`,strokeLinecap:'round'})
    ),
    React.createElement('div',{className:'circ-label',style:{fontSize:size<44?11:13}},count)
  );
}

function Login({onLogin,users,theme,setTheme}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false); 

  const handle = () => {
    setErr('');
    setLoading(true);

    fetch("https://mkaerp-production.up.railway.app/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: pass
      })
    })
    .then(async res => {
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || "Login failed");
      }
      return res.json();
    })
    .then(user => {
      if (!user.active) {
        setErr("Account disabled.");
        setLoading(false);
        return;
      }

      console.log("Logged in user:", user);
      onLogin(user);
      setLoading(false);
    })
    .catch(err => {
      console.error(err);
      setErr(err.message || "Invalid credentials.");
      setLoading(false); // ✅ FIX 2
    });
  };

  // ✅ SAFE GROUPING (no crash if users empty)
  const grouped={};
  if(users && users.length){
    users.forEach(u=>{
      if(!grouped[u.role])grouped[u.role]=[];
      grouped[u.role].push(u);
    });
  }

  const roleLabels={
    owner:'Owners',
    employee:'Employees',
    admin:'Admin',
    accountant:'Accountants'
  };

  return React.createElement('div',{className:'login-wrap'},
    React.createElement('div',{className:'login-card'},
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:18,fontWeight:700,color:'var(--text)'}},'⚙ MKA ERP'),
          React.createElement('div',{style:{fontSize:10,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace",marginTop:2}},'Business Management System')
        ),
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:7,fontSize:11,color:'var(--text3)'}},
          theme==='dark'?'🌙':'☀️',
          React.createElement('div',{
            className:`toggle-track${theme==='light'?' on':''}`,
            onClick:()=>setTheme(t=>t==='easter'?'dark':t==='dark'?'light':'dark')
          },
            React.createElement('div',{className:'toggle-thumb'})
          )
        )
      ),

      React.createElement('div',{style:{fontSize:16,fontWeight:600,marginBottom:3,color:'var(--text)'}},'Sign in'),
      React.createElement('div',{style:{fontSize:12,color:'var(--text3)'}},'Enter your credentials'),

      React.createElement('div',{className:'login-form'},
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Email'),
          React.createElement('input',{
            type:'email',
            value:email,
            onChange:e=>setEmail(e.target.value),
            placeholder:'your@email.com'
          })
        ),

        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Password'),
          React.createElement('input',{
            type:'password',
            value:pass,
            onChange:e=>setPass(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&handle(),
            placeholder:'••••••••'
          })
        ),

        err && React.createElement('div',{
          style:{
            fontSize:11,
            color:'var(--red)',
            padding:'7px 11px',
            background:'var(--red-bg)',
            borderRadius:10
          }
        },err),

        React.createElement('button',{
          className:'btn btn-primary',
          onClick:handle,
          style:{width:'100%',padding:'11px'},
          disabled: loading
        }, loading ? 'Signing in...' : 'Sign in →')
      )
    )
  );
}

  const generate=id=>{
    const inv=data.invoices.find(i=>i.id===id);
    if(!inv)return;
    setData(d=>{
      // Mark invoice as sent
      const invoices=d.invoices.map(i=>i.id===id?{...i,accountantSent:true}:i);
      // Deduct stock for each item in the invoice
      let products=[...d.products];
      inv.items.forEach(it=>{
        const qty=parseInt(it.qty)||1;
        products=products.map(p=>{
          if(p.id===it.productId||normalize(p.name)===normalize(it.name)){
            return{...p,stock:Math.max(0,p.stock-qty)};
          }
          return p;
        });
      });
      return{...d,invoices,products};
    });
    // Warn if any item goes low/out after deduction
    const lowAfter=[];
    inv.items.forEach(it=>{
      const p=data.products.find(p=>p.id===it.productId||normalize(p.name)===normalize(it.name));
      if(p){
        const newStock=Math.max(0,p.stock-(parseInt(it.qty)||1));
        if(newStock===0)lowAfter.push(p.name+' is now OUT OF STOCK');
        else if(newStock<=10)lowAfter.push(p.name+' is now LOW ('+newStock+' left)');
      }
    });
    if(lowAfter.length){
      setTimeout(()=>notify('⚠ Stock alert: '+lowAfter.join(' | '),'error'),600);

function ProductsPage({user,data,setData,notify}){
  const {products}=data;
  const [showImport,setShowImport]=useState(false);
  const [importStep,setImportStep]=useState('choose'); // choose|manual|excel-upload|excel-map|excel-preview
  const [showEdit,setShowEdit]=useState(null);
  const [ef,setEf]=useState({});
  // manual
  const [manualDate,setManualDate]=useState('');
  const [manualRows,setManualRows]=useState([{name:'',price:'',stock:'',category:''}]);
  // excel
  const [xlsxRows,setXlsxRows]=useState(null);
  const [xlsxHeaders,setXlsxHeaders]=useState([]);
  const [colMap,setColMap]=useState({name:'',price:'',stock:'',category:''});
  const [preview,setPreview]=useState([]);
  const [isDrag,setIsDrag]=useState(false);
  const fileRef=useRef();
  const isAdmin=user.role==='admin';

  const openImport=()=>{setImportStep('choose');setManualRows([{name:'',price:'',stock:'',category:''}]);setManualDate('');setXlsxRows(null);setXlsxHeaders([]);setColMap({name:'',price:'',stock:'',category:''});setPreview([]);setShowImport(true)};

  const saveEdit = () => {
    if(!ef.name.trim()){
      notify('Name required','error');
      return;
    }

    fetch(`https://mkaerp-production.up.railway.app/products/${showEdit.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...ef,
        price: Number(ef.price),
        stock: Number(ef.stock)
      })
    })
    .then(res => res.json())
    .then(updated => {
      setData(d => ({
        ...d,
        products: d.products.map(p =>
          p.id === updated.id ? updated : p
        )
      }));

      notify('Product updated','success');
      setShowEdit(null);
    })
    .catch(err => {
      console.error(err);
      notify('Update failed','error');
    });
  };

  const doManual = async () => {
    if(!manualDate){
      notify('Arrival date required','error');
      return;
    }

    const valid = manualRows.filter(r =>
      r.name.trim() && r.price && r.stock && r.category.trim()
    );

    if(!valid.length){
      notify('Add at least one complete row','error');
      return;
    }

    try {
      const responses = await Promise.all(
        valid.map(r =>
          fetch("https://mkaerp-production.up.railway.app/products", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: r.name.trim(),
              price: Number(r.price),
              stock: Number(r.stock),
              category: r.category.trim(),
              added_date: manualDate
            })
          }).then(res => res.json())
        )
      );

      setData(d => ({
        ...d,
        products: [...d.products, ...responses]
      }));

      notify(valid.length + ' product(s) imported','success');
      setShowImport(false);

    } catch(err){
      console.error(err);
      notify('Import failed','error');
    }
  };

  const handleFile=e=>{
    const file=e.target?.files?.[0]||e.dataTransfer?.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(raw.length<2){notify('Sheet appears empty','error');return}
        const hdrs=raw[0].map(String);
        const rows=raw.slice(1).filter(r=>r.some(c=>String(c).trim()));
        setXlsxHeaders(hdrs);setXlsxRows(rows);
        const g={name:'',price:'',stock:'',category:''};
        hdrs.forEach((h,i)=>{
          const n=normalize(h);
          if(!g.name&&(n.includes('name')||n.includes('product')||n.includes('item')))g.name=String(i);
          if(!g.price&&(n.includes('price')||n.includes('cost')||n.includes('rate')))g.price=String(i);
          if(!g.stock&&(n.includes('stock')||n.includes('qty')||n.includes('quantity')||n.includes('count')))g.stock=String(i);
          if(!g.category&&(n.includes('category')||n.includes('type')||n.includes('class')))g.category=String(i);
        });
        setColMap(g);setImportStep('excel-map');
      }catch(err){notify('Could not read file — use .xlsx or .csv','error')}
    };
    reader.readAsArrayBuffer(file);
  };

  const buildPreview=()=>{
    if(!colMap.name){notify('Map the Product Name column','error');return}
    const rows=xlsxRows.map(r=>({
      name:String(r[parseInt(colMap.name)]||'').trim(),
      price:parseFloat(r[colMap.price!==''?parseInt(colMap.price):-1])||0,
      stock:parseInt(r[colMap.stock!==''?parseInt(colMap.stock):-1])||0,
      category:String(r[colMap.category!==''?parseInt(colMap.category):-1]||'Imported').trim(),
    })).filter(r=>r.name);
    const tagged=rows.map(r=>{
      const match=products.find(p=>normalize(p.name)===normalize(r.name));
      return{...r,match:match||null,action:match?'update':'new'};
    });
    setPreview(tagged);setImportStep('excel-preview');
  };

  const doXlsx = async () => {
    const today = new Date().toISOString().split('T')[0];

    try {
      const results = await Promise.all(
        preview.map(r => {
          if (r.action === 'update' && r.match) {
            return fetch(`https://mkaerp-production.up.railway.app/products/${r.match.id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                ...r.match,
                stock: r.match.stock + r.stock,
                price: r.price || r.match.price
              })
            }).then(res => res.json());
          } else {
            return fetch("https://mkaerp-production.up.railway.app/products", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: r.name,
                price: Number(r.price),
                stock: Number(r.stock),
                category: r.category,
                added_date: today
              })
            }).then(res => res.json());
          }
        })
      );

      setData(d => ({
        ...d,
        products: [
          ...d.products.filter(p => !results.find(r => r.id === p.id)),
          ...results
        ]
      }));

      notify('Import completed','success');
      setShowImport(false);

    } catch(err){
      console.error(err);
      notify('Excel import failed','error');
    }
  };

  const R=React.createElement;
  return R('div',null,
    R('div',{className:'grid-3',style:{marginBottom:18}},
      [{label:'Total',val:products.length},{label:'In Stock',val:products.filter(p=>p.stock>0).length},{label:'Out of Stock',val:products.filter(p=>p.stock===0).length}]
        .map(m=>R('div',{key:m.label,className:'metric'},R('div',{className:'metric-label'},m.label),R('div',{className:'metric-value'},m.val)))
    ),
    R('div',{className:'card'},
      R('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,gap:10,flexWrap:'wrap'}},
        R('div',{className:'card-title',style:{margin:0}},'Product Catalog'),
        isAdmin&&R('button',{className:'btn btn-primary',onClick:openImport},'+ Import Products')
      ),
      R('div',{className:'tbl-scroll'},R('table',null,
        R('thead',null,R('tr',null,R('th',null,'Product'),R('th',null,'Category'),R('th',null,'Price'),R('th',null,'Stock'),R('th',null,'Added'),R('th',null,'Status'),isAdmin&&R('th',null,''))),
        R('tbody',null,products.map(p=>R('tr',{key:p.id},
          R('td',{className:'primary'},p.name),
          R('td',null,p.category),
          R('td',null,R('span',{style:{fontFamily:"'JetBrains Mono',monospace"}},fmtCurrency(p.price))),
          R('td',null,p.stock),
          R('td',null,p.addedDate||'—'),
          R('td',null,R('span',{className:`badge ${p.stock===0?'rejected':p.stock<=10?'low-stock':'in-stock'}`},p.stock===0?'Out of stock':p.stock<=10?'Low stock':'In stock')),
          isAdmin&&R('td',null,R('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setEf({name:p.name,price:p.price,stock:p.stock,category:p.category});setShowEdit(p)}},'Edit'))
        )))
      ))
    ),
    showEdit&&R('div',{className:'modal-overlay'},
      R('div',{className:'modal',style:{maxWidth:440}},
        R('div',{className:'modal-title'},'Edit Product'),
        R('div',{className:'form-grid'},
          R('div',{className:'form-group'},R('label',null,'Name'),R('input',{value:ef.name,onChange:e=>setEf(f=>({...f,name:e.target.value}))})),
          R('div',{className:'form-group'},R('label',null,'Category'),R('input',{value:ef.category,onChange:e=>setEf(f=>({...f,category:e.target.value}))})),
          R('div',{className:'form-row'},
            R('div',{className:'form-group'},R('label',null,'Price (OMR)'),R('input',{type:'number',value:ef.price,onChange:e=>setEf(f=>({...f,price:e.target.value}))})),
            R('div',{className:'form-group'},R('label',null,'Stock'),

    React.createElement('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:16}},

        React.createElement('div',{className:'card-title',style:{color:roleColors[role]}},role.charAt(0).toUpperCase()+role.slice(1)+'s'),

            React.createElement('td',null,React.createElement('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,cursor:'pointer',color:'var(--text2)',filter:showPass[u.id]?'none':'blur(4px)',userSelect:'none'},onClick:()=>setShowPass(p=>({...p,[u.id]:!p[u.id]}))},u.password)),

                React.createElement('button',{className:'btn btn-ghost btn-sm',title:'Regen passcode',onClick:()=>{const np=genPasscode(u.role);setData(d=>({...d,users:d.users.map(x=>x.id===u.id?{...x,password:np}:x)}));notify('New passcode: '+np,'success')}},'⟳'),
                React.createElement('button',{className:`btn btn-sm ${u.active?'btn-amber':'btn-success'}`,onClick:()=>{setData(d=>({...d,users:d.users.map(x=>x.id===u.id?{...x,active:!x.active}:x)}));notify(u.name+(u.active?' disabled':' enabled'),'success')}},u.active?'Disable':'Enable'),
                u.role!=='admin'&&React.createElement('button',{className:'btn btn-danger btn-sm',onClick:()=>{setData(d=>({...d,users:d.users.filter(x=>x.id!==u.id)}));notify('Deleted','success')}},'Delete')

        React.createElement('div',{className:'form-grid'},

            React.createElement('div',{className:'form-group'},React.createElement('label',null,'Email'),React.createElement('input',{value:form.email,onChange:e=>setForm(f=>({...f,email:e.target.value}))}))
          ),
          React.createElement('div',{className:'form-row'},
            React.createElement('div',{className:'form-group'},React.createElement('label',null,'Role'),React.createElement('select',{value:form.role,onChange:e=>setForm(f=>({...f,role:e.target.value}))},['owner','employee','accountant'].map(r=>React.createElement('option',{key:r,value:r},r.charAt(0).toUpperCase()+r.slice(1))))),

function DevToolsPage({ user }) {
  return React.createElement('div', { className: 'mini-grid' },
    MiniBox('AI Debug Mode', ToggleSwitch()),

    MiniBox('Force Sync', ActionButton('Run Sync')),
    MiniBox('Clear Cache', ActionButton('Clear')),
    MiniBox('Dark Mode Override', ToggleSwitch()),
    MiniBox('Mock Data Mode', ToggleSwitch()),
    MiniBox('Test Notifications', ActionButton('Send')),
    MiniBox('DB Health Check', ActionButton('Check'))
  );

function MiniBox(title, content) {
  return React.createElement('div', { className: 'mini-card' },
    React.createElement('div', { className: 'mini-title' }, title),
    React.createElement('div', { className: 'mini-content' }, content)
  );
}

function ToggleSwitch() {
  const [on, setOn] = React.useState(false);
  return React.createElement('div', {
    className: 'toggle',
    onClick: () => setOn(!on)
  },
    React.createElement('div', {
      className: 'toggle-knob',
      style: { transform: on ? 'translateX(16px)' : 'translateX(0)' }
    })
  );
}

function ActionButton(label) {
  return React.createElement('button', {
    className: 'mini-btn',
    onClick: () => alert(label + ' clicked')
  }, label);
}

function App(){
  const [user,setUser]=useState(null);
  const [active,setActive]=useState('dashboard');

  // 🔥 MAIN DATA STATE
  const [data,setData]=useState({
    leads:LEADS_INIT,
    invoices:INVOICES_INIT,
    products:[], // ✅ REMOVED DEMO DATA
    users:[],
    quotations:QUOTATIONS_INIT,
    formalQuotations:FORMAL_QUOT_INIT
  });

  const [notif,setNotif]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [mobProfile,setMobProfile]=useState(false);

  const notify=(msg,type='success')=>setNotif({msg,type});

  // 🎨 theme
  useEffect(()=>{
    document.body.className=theme;
    document.body.style.backgroundImage='none';
  },[theme]);

  // 🔐 RESTORE LOGIN
  useEffect(()=>{
    const savedUser = localStorage.getItem("user");
    if(savedUser){
      try{
        setUser(JSON.parse(savedUser));
      }catch{
        localStorage.removeItem("user");
      }
    }
  },[]);

  // 🚀 FETCH USERS
  useEffect(() => {
    fetch("https://mkaerp-production.up.railway.app/users")
      .then(res => res.json())
      .then(usersFromDB => {
        setData(prev => ({
          ...prev,
          users: usersFromDB || []
        }));
      })
      .catch(err => console.error("Users fetch error:", err));
  }, []);

  // 🚀 FETCH PRODUCTS (FIXED PROPERLY)
  useEffect(() => {
    fetch("https://mkaerp-production.up.railway.app/products")
      .then(res => res.json())
      .then(productsFromDB => {

        const formatted = (productsFromDB || []).map(p => ({
          ...p,
          price: Number(p.price || 0),
          stock: Number(p.stock || 0),
          addedDate: p.added_date || null
        }));

        console.log("Products:", formatted);

        setData(prev => ({
          ...prev,
          products: formatted
        }));
      })
      .catch(err => console.error("Products fetch error:", err));
  }, []);

  // 🔐 LOGIN
  if(!user)
    return React.createElement(Login,{
      onLogin:u=>{
        localStorage.setItem("user", JSON.stringify(u));
        setUser(u);
        setActive('dashboard');
      },
      users:data.users || [],
      theme,
      setTheme
    });

  const titles={
    dashboard:['Dashboard','Overview'],
    customers:['Customers','Manage records'],
    invoices:['Invoices','Invoice records'],
    'create-invoice':['New Invoice','Create and submit'],
    approvals:['Approvals','Review pending'],
    'approved-invoices':['Approved Invoices','Generate and print'],
    products:['Product Catalog','All products'],
    users:['Users','User management'],
    quotation:['Quotation Uphold','Demand & formal quotations'],
    delivery:['Delivery','Schedule and track deliveries'],
    devtools:['Dev Tools','Developer utilities']
  };

  const [pt,ps]=titles[active]||['Dashboard',''];

  const props={user,data,setData,notify};

  // 🔐 LOGOUT
  const logout=()=>{
    localStorage.removeItem("user");
    setUser(null);
  };

  const page=()=>{
    if(active==='dashboard'){
      if(user.role==='employee')return React.createElement(EmployeeDashboard,props);
      if(user.role==='accountant')return React.createElement(AccountantDashboard,props);
      return React.createElement(OwnerDashboard,props);
    }
    if(active==='customers')return React.createElement(CustomersPage,props);
    if(active==='products')return React.createElement(ProductsPage,props);
    if(active==='create-invoice')return React.createElement(CreateInvoice,props);
    if(active==='invoices')return React.createElement(InvoicesPage,props);
    if(active==='approvals')return React.createElement(ApprovalsPage,props);
    if(active==='approved-invoices')return React.createElement(ApprovedInvoicesPage,props);
    if(active==='delivery')return React.createElement(DeliveryPage,props);
    if(active==='users')return React.createElement(UsersPage,props);
    if(active==='quotation')return React.createElement(QuotationUphold,props);
    if(active==='devtools')return React.createElement(DevToolsPage, props);
    return React.createElement('div',{className:'card',style:{color:'var(--text3)'}},'Coming soon');
  };

  return React.createElement('div',{className:'app'},
    notif&&React.createElement(Notif,{...notif,onClose:()=>setNotif(null)}),

    React.createElement(Sidebar,{user,active,setActive,onLogout:logout,theme,setTheme}),
    React.createElement(MobileNav,{user,active,setActive,onLogout:logout}),

    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('div',null,
          React.createElement('div',{className:'page-title'},pt),
          React.createElement('div',{className:'page-sub'},ps)
        ),
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
          React.createElement('span',{
            className:'topbar-date',
            style:{
              fontSize:11,
              color:'var(--text3)',
              fontFamily:"'JetBrains Mono',monospace",
              background:'var(--bg3)',
              padding:'5px 10px',
              borderRadius:10,
              border:'1px solid var(--border)',
              cursor:'pointer'
            },
            onClick:()=>{if(theme!=='easter')setTheme('easter');}
          },new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})),

          React.createElement(MobThemeBtn,{theme,setTheme}),
          React.createElement(MobProfileBtn,{user,onOpen:()=>setMobProfile(true)})
        )
      ),

      React.createElement('div',{className:'content'},page())
    ),

    mobProfile&&React.createElement('div',{className:'mob-profile-sheet',onClick:()=>setMobProfile(false)},
      React.createElement('div',{className:'mob-profile-inner',onClick:e=>e.stopPropagation()},
        React.createElement('div',{className:'mob-profile-header'},
          React.createElement('div',{className:'mob-big-avatar'},getInitials(user.name)),
          React.createElement('div',null,
            React.createElement('div',{className:'mob-profile-info-name'},user.name),
            React.createElement('div',{className:'mob-profile-info-role'},user.role),
            React.createElement('div',{className:'mob-profile-info-email'},user.email||'')
          )
        ),
        React.createElement('button',{
          className:'btn btn-danger',
          style:{width:'100%',padding:'14px',fontSize:14},
          onClick:()=>{setMobProfile(false);logout();}
        },'Sign Out')
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
